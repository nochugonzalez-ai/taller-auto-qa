name: Pipeline Ejecutor de Pruebas QA

on:
  push:
    branches: [ "main" ]

jobs:
  ejecutar-tests:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Descargar el código
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    # Paso 2: Instalar y configurar Python
    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Paso 3: Instalar todas las dependencias
    - name: Instalar dependencias de QA y Seguridad
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Paso 4: Escaneo de Seguridad Estática (SAST) con Bandit
    - name: Ejecutar Escaneo de Seguridad con Bandit
      run: |
        bandit -r .

    # Paso 5: Descargar los navegadores para Playwright
    - name: Instalar Navegadores de Playwright
      run: playwright install --with-deps

    # Paso 6: Ejecutar las pruebas funcionales (API y Web)
    - name: Ejecutar Test Suite con Pytest
      run: |
        pytest -v
