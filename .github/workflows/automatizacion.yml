name: Pipeline Ejecutor de Pruebas QA

on:
  push:
    branches: [ "main" ]

jobs:
  ejecutar-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias de QA y Seguridad
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Escaneo de Seguridad con Bandit
      run: |
        bandit -r .

    - name: Instalar Navegadores de Playwright
      run: playwright install --with-deps

    - name: Ejecutar Test Suite con Pytest
      run: |
        pytest -v
